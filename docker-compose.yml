services:
  postgres:
    image: postgres:16
    container_name: trustops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trustops_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - trustops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trustops_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: trustops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trustops_ai
      JWT_SECRET_KEY: trustops-docker-secret-key-change-later
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      USE_REAL_LLM: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.5-flash-lite
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: trustops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  trustops_postgres_data: