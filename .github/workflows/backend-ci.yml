name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    name: FastAPI Backend Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trustops_ai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d trustops_ai"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustops_ai
      JWT_SECRET_KEY: github-actions-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      USE_REAL_LLM: "false"
      GEMINI_API_KEY: dummy-key
      GEMINI_MODEL: gemini-2.5-flash-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.docker.txt

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/api/evaluations.py
          python -m py_compile app/api/reports.py
          python -m py_compile app/services/evaluation_service.py
          python -m py_compile app/services/gemini_service.py

      - name: Import FastAPI app
        run: |
          python -c "from app.main import app; print('Backend app imported successfully')"