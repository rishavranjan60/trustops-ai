name: Docker Build Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    env:
      COMPOSE_BAKE: "false"
      GEMINI_API_KEY: dummy-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker services
        run: docker compose build