name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Next.js Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build